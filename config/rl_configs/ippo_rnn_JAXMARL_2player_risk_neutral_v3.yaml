# Risk-neutral V3 reference training config.
# Put this file in: config/rl_configs/ippo_rnn_JAXMARL_2player_risk_neutral_v3.yaml

"LR": [0.00025, 0.00025]
"NUM_ENVS": 4096
"NUM_STEPS": 64
"NUM_STEPS_EVAL": 64
"GRU_HIDDEN_DIM": 256
"FC_DIM_SIZE": 256
"TOTAL_TIMESTEPS": 5e8
"UPDATE_EPOCHS": 4
"NUM_MINIBATCHES": 4
"GAMMA": [0.999999999, 0.999]
"GAE_LAMBDA": [0.85, 0.9]
"CLIP_EPS": 0.2
"SCALE_CLIP_EPS": [False, False]
"ENT_COEF": [0.01, 0.01]
"VF_COEF": [0.5, 0.5]
"MAX_GRAD_NORM": [0.5, 0.5]
"ACTIVATION": ["relu", "relu"]
"ENV_NAME": "JAXMARL-Lob-v0"
"NUM_AGENTS_PER_TYPE": [1, 1]
"SEED": 42
"N_DEVICES": 1
"ENV_CONFIG": "config/env_configs/2_player_fq_fqc_risk_neutral_v3.json"
"ANNEAL_LR": [True, True]

# WandB / logging
"ENTITY": "ark-dong-university-of-amsterdam"
"PROJECT": "Thesis_risk_neutral_reference"
"WANDB_MODE": "disabled"

# Dataset split control. Training uses train; validation is only for monitoring/reference checks.
"CALC_EVAL": True
"TimePeriod": "train"
"EvalTimePeriod": "val"
"Calculate Baseline": False
"Timing": False

# Direct overrides. These are used by create_agent_configs and override the JSON values.
AGENT_CONFIGS:
  MarketMaking:
    inv_penalty: "quadratic_rho"
    rho_mm: 0.0
  Execution:
    reward_lambda: 0.0
    doom_price_penalty: 3
    reference_price: "far_touch"
    rho_ex: 0.0
    zeta_ex: -1.0

# No WandB sweep for the risk-neutral reference run.
SWEEP_PARAMETERS: {}
