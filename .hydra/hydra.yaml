hydra:
  run:
    dir: .
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=.
    - hydra.mode=RUN
    task:
    - ENV_CONFIG=config/env_configs/2_player_fq_fqc.json
    - EvalTimePeriod=val
    - RESTORE_PROJECT=medium
    - RESTORE_RUN=toasty-sweep-1
    - RESTORE_STEP=512
    - NUM_ENVS=4096
    - NUM_STEPS=64
    - NUM_UPDATES=32
    - N_DEVICES=1
    - SEED=42
    - GRU_HIDDEN_DIM=256
    - FC_DIM_SIZE=256
    - WANDB_MODE=online
    - ENTITY=ark-dong-university-of-amsterdam
    - PROJECT=Thesis-validation
  job:
    name: baseline_JAXMARL
    chdir: null
    override_dirname: ENTITY=ark-dong-university-of-amsterdam,ENV_CONFIG=config/env_configs/2_player_fq_fqc.json,EvalTimePeriod=val,FC_DIM_SIZE=256,GRU_HIDDEN_DIM=256,NUM_ENVS=4096,NUM_STEPS=64,NUM_UPDATES=32,N_DEVICES=1,PROJECT=Thesis-validation,RESTORE_PROJECT=medium,RESTORE_RUN=toasty-sweep-1,RESTORE_STEP=512,SEED=42,WANDB_MODE=online
    id: ???
    num: ???
    config_name: 2player_config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.3
    version_base: '1.3'
    cwd: /gpfs/home4/adong/JaxMARL-HFT
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /gpfs/home4/adong/JaxMARL-HFT/gymnax_exchange/jaxrl/MARL/baseline_eval/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /gpfs/home4/adong/JaxMARL-HFT
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
